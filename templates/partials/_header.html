{% set header_title = header_title|default("ダッシュボード") %}
{% set header_meta = header_meta|default("開発管理システム") %}
{% set unread_count = unread_count|default(0) %}
<header class="app-header">
    <div class="app-header-left">
        <button type="button" class="mobile-menu-button" data-drawer-open aria-controls="mobileDrawer" aria-expanded="false" aria-label="メニューを開く">
            &#9776;
        </button>
        <div>
            <div class="app-header-title">{{ header_title }}</div>
            <div class="app-header-meta">{{ header_meta }}</div>
        </div>
    </div>
    <div class="app-header-right">
        <div class="header-notification">
            <button type="button" class="header-notification-button" aria-label="通知を開く">
                <svg class="header-notification-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                    <path class="header-notification-stroke" d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                    <path class="header-notification-stroke" d="M13.73 21a2 2 0 0 1-3.46 0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                    {% if unread_count|int > 0 %}
                    <circle class="header-notification-badge" cx="18" cy="7" r="4.5" />
                    {% endif %}
                </svg>
            </button>
        </div>
        <div class="account-menu" data-account-menu-root>
            <button type="button" class="account-menu-trigger" data-account-menu-toggle aria-label="アカウントメニューを開く" aria-haspopup="menu" aria-expanded="false" aria-controls="accountMenuDropdown">
                <svg class="header-user-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="user">
                    <circle class="header-user-icon-bg" cx="20" cy="20" r="20" fill="var(--color-header-icon-bg)" />
                    <circle class="header-user-icon-figure" cx="20" cy="15" r="6" fill="var(--color-header-icon-figure)" />
                    <path class="header-user-icon-figure" d="M8 34 Q8 24 20 24 Q32 24 32 34" fill="var(--color-header-icon-figure)" />
                </svg>
            </button>
            <div id="accountMenuDropdown" class="account-menu-dropdown" data-account-menu aria-hidden="true" role="menu">
                <button type="button" class="account-menu-item" data-account-menu-item role="menuitem">プロフィール</button>
                <button type="button" class="account-menu-item" data-account-menu-item role="menuitem">アカウント設定</button>
                <button type="button" class="account-menu-item" data-account-menu-item role="menuitem">ログアウト</button>
            </div>
        </div>
    </div>
</header>
