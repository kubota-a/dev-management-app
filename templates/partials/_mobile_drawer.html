{% set active_menu = active_menu|default("") %}
<div id="mobileDrawerOverlay" class="mobile-drawer-overlay" data-drawer-close></div>

<aside id="mobileDrawer" class="mobile-drawer" aria-hidden="true">
    <div class="mobile-drawer-header">
        <div class="app-sidebar-title">開発管理システム</div>
        <button type="button" class="mobile-drawer-close" data-drawer-close aria-label="メニューを閉じる">&times;</button>
    </div>

    <div class="mobile-drawer-body">
        <div class="app-sidebar-section-title">Menu</div>
        <nav class="app-nav">
            {% if app_role == "applicant" %}
            <a href="/top/applicant" class="app-nav-link{% if active_menu == 'applicant_top' %} is-active{% endif %}">トップ</a>
            <a href="#" class="app-nav-link{% if active_menu == 'new_request' %} is-active{% endif %}">新規案件申請</a>
            <a href="#" class="app-nav-link{% if active_menu == 'my_projects' %} is-active{% endif %}">自分の案件</a>
            <a href="#" class="app-nav-link{% if active_menu == 'my_notifications' %} is-active{% endif %}">通知 <span class="app-nav-count" aria-label="2 unread">2</span></a>
            <a href="#" class="app-nav-link{% if active_menu == 'profile' %} is-active{% endif %}">プロフィール</a>
            {% elif app_role == "manager" %}
            <a href="/top/manager" class="app-nav-link{% if active_menu == 'manager_top' %} is-active{% endif %}">トップ</a>
            <a href="#" class="app-nav-link{% if active_menu == 'dept_approvals' %} is-active{% endif %}">部門承認待ち</a>
            <a href="#" class="app-nav-link{% if active_menu == 'dept_projects' %} is-active{% endif %}">自部門案件</a>
            <a href="#" class="app-nav-link{% if active_menu == 'dept_delays' %} is-active{% endif %}">遅延案件</a>
            <a href="#" class="app-nav-link{% if active_menu == 'dept_notifications' %} is-active{% endif %}">通知 <span class="app-nav-count" aria-label="4 unread">4</span></a>
            {% else %}
            <a href="/top/hq" class="app-nav-link{% if active_menu == 'hq_top' %} is-active{% endif %}">トップ</a>
            <a href="#" class="app-nav-link{% if active_menu == 'hq_approvals' %} is-active{% endif %}">本部承認待ち</a>
            <a href="#" class="app-nav-link{% if active_menu == 'all_projects' %} is-active{% endif %}">全案件管理</a>
            <a href="#" class="app-nav-link{% if active_menu == 'department_status' %} is-active{% endif %}">部門別状況</a>
            <a href="#" class="app-nav-link{% if active_menu == 'hq_notifications' %} is-active{% endif %}">通知 <span class="app-nav-count" aria-label="3 unread">3</span></a>
            {% endif %}
        </nav>
    </div>
</aside>
